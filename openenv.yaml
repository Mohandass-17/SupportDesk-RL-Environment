name: supportdesk-openenv
description: >
  AI Support Desk RL environment. Agents learn to classify, resolve,
  and escalate customer support tickets across three difficulty levels.
version: 2.0

tasks:
  - name: ticket_classification
    module: tasks.task_easy
    difficulty: easy
    max_steps: 5
    success_threshold: 0.6

  - name: ticket_resolution
    module: tasks.task_medium
    difficulty: medium
    max_steps: 10
    success_threshold: 0.75

  - name: escalation_decision
    module: tasks.task_hard
    difficulty: hard
    max_steps: 15
    success_threshold: 0.90

entrypoint: env.environment:SupportDeskEnv

reward_range: [0.0, 1.0]
seed: 42
